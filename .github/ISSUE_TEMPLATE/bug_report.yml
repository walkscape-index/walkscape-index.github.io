name: 🐛 Bug Report
description: Report a bug, broken/deprecated links, outdated info, or layout issues.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! Please provide as much detail as possible to help us fix it.
  - type: dropdown
    id: bug-category
    attributes:
      label: Bug Category
      description: What type of issue are you reporting?
      options:
        - "Link issue / Broken Link (404 / connection error)"
        - "Deprecated / Outdated Tool, site"
        - "Incorrect or Missing Metadata"
        - "Layout / Visual Styling Bug"
        - "Functional / Logic Bug"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "E.g., The link for Kyoro's Networth Calculator is broken, it points to networth.walkscape.com.br which returns a 404."
    validations:
      required: true
  - type: input
    id: affected-url
    attributes:
      label: Affected URL
      description: URL of the tool or the specific walkscape-index page where this happens.
      placeholder: "https://walkscape-index.github.io/tools/kyoro-networth-calculator"
    validations:
      required: false
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment & Browser Info
      description: OS version, Browser type (e.g. Chrome, Firefox, Safari) and version.
      placeholder: "Windows 11, Chrome 124.0.0"
    validations:
      required: false
