name: Update Google Drive Metadata

on:
  schedule:
    - cron: "0 */12 * * *" 
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  sync-metadata:
    name: Sync Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ADMIN_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          token: ""

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Last Modified Dates
        run: bun run fetch-last-modified
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Pull Remote Changes
        run: git pull origin ${{ github.head_ref || github.ref_name }} --rebase --autostash

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(data): sync Google Drive metadata [skip ci]"
          file_pattern: "src/data/last_modified.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
